            { name: "Pokok 🌳", type: "Hidup" },

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sains Tahun 1 - Benda Hidup & Bukan Hidup</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d4fc79, #96e6ff);
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 50px;
            color: #1b5e20;
            margin-bottom: 10px;
        }

        .header h2 {
            font-size: 30px;
            color: #0d47a1;
        }

        .score-box {
            background: #fff176;
            padding: 15px 30px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 20px;
            font-size: 25px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .instruction {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
            color: #6a1b9a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .item {
            background: white;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            cursor: grab;
            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .item:hover {
            transform: translateY(-8px) scale(1.05);
            background: linear-gradient(135deg, #b2fefa, #0ed2f7);
        }

        .dropzones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .zone {
            min-height: 300px;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            border: 5px dashed white;
            transition: 0.3s ease;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .zone h3 {
            font-size: 40px;
            margin-bottom: 15px;
            color: white;
        }

        .living {
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .nonliving {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        .message {
            margin-top: 25px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #37474f;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .footer {
            margin-top: 50px;
            text-align: center;
        }

        .footer button {
            padding: 18px 35px;
            border: none;
            border-radius: 20px;
            background: #1565c0;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer button:hover {
            transform: scale(1.08);
            background: #0d47a1;
        }

        @media(max-width:768px){
            .header h1 {
                font-size: 36px;
            }

            .header h2 {
                font-size: 24px;
            }

            .zone h3 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🔬 Sains Tahun 1</h1>
        <h2>Unit 3: Benda Hidup & Benda Bukan Hidup</h2>

        <div class="score-box">
            Skor: <span id="score">0</span>
        </div>
    </div>

    <div class="instruction" id="instruction">
        Seret objek ke kategori yang betul!
    </div>

    <div class="items" id="itemsContainer"></div>

    <div class="dropzones">

        <div class="zone living"
             data-zone="Hidup">
            <h3>🌱 Benda Hidup</h3>
            <p>Seret benda hidup ke sini</p>
        </div>

        <div class="zone nonliving"
             data-zone="Bukan Hidup">
            <h3>🪨 Benda Bukan Hidup</h3>
            <p>Seret benda bukan hidup ke sini</p>
        </div>

    </div>

    <div class="message" id="message">
        Mari belajar sambil bermain! 🎮
    </div>

    <div class="footer">
        <button onclick="restartGame()">🔄 Main Semula</button>
    </div>

</div>

<audio id="correctSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=correct-2-46134.mp3" type="audio/mp3">
</audio>

<audio id="wrongSound">
    <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=wrong-answer-129254.mp3" type="audio/mp3">
</audio>

<script>
    let score = 0;
    let selectedItem = null;

    const items = document.querySelectorAll('.item');
    const zones = document.querySelectorAll('.zone');
    const scoreDisplay = document.getElementById('score');
    const message = document.getElementById('message');

    const itemsContainer = document.getElementById('itemsContainer');

    itemsData.forEach(data => {
        const div = document.createElement('div');
        div.className = 'item';
        div.draggable = true;
        div.dataset.type = data.type;
        div.dataset.name = data.name;
        div.innerHTML = data.name;
        itemsContainer.appendChild(div);
    });

    const items = document.querySelectorAll('.item');

    items.forEach(item => {
        item.addEventListener('dragstart', () => {
            selectedItem = item;
        });
    });

    zones.forEach(zone => {

        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        zone.addEventListener('drop', () => {

            const correctType = zone.dataset.zone;
            const itemType = selectedItem.dataset.type;
            const itemName = selectedItem.dataset.name;

            if(correctType === itemType){

                zone.appendChild(selectedItem);
                selectedItem.style.background = '#c8e6c9';

                score++;
                scoreDisplay.innerText = score;

                message.innerHTML = `✅ Betul! ${itemName} ialah benda ${itemType}`;

                document.getElementById('correctSound').play();

            } else {

                message.innerHTML = `❌ Oops! ${itemName} bukan dalam kategori ${correctType}`;

                document.getElementById('wrongSound').play();
            }
        });
    });

    function restartGame(){
        location.reload();
    }
</script>

</body>
</html>
