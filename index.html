<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Simulasi Tumbesaran Pokok</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  transition: 0.5s;
  background: linear-gradient(#87ceeb, #e0f7ff);
}

.dark {
  background: linear-gradient(#1e2a38, #000);
  color: white;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* Plant Area */
#plantArea {
  font-size: 120px;
  margin: 30px 0;
  transition: 0.5s;
}

/* Animations */
.grow {
  animation: grow 1s infinite alternate;
}

.wilt {
  animation: wilt 1s infinite alternate;
}

@keyframes grow {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

@keyframes wilt {
  from { transform: rotate(0deg); }
  to { transform: rotate(12deg); }
}

/* Buttons */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.water { background: #4da6ff; color: white; }
.light { background: #ffd633; }
.soil { background: #8B4513; color: white; }

/* Progress bars */
.bar {
  width: 80%;
  height: 10px;
  background: #ddd;
  margin: 10px auto;
  border-radius: 10px;
}

.fill {
  height: 100%;
  width: 50%;
  border-radius: 10px;
}

.waterFill { background: #4da6ff; }
.lightFill { background: #ffd633; }
.soilFill { background: #4CAF50; }

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.dark .card {
  background: #2c3e50;
}
</style>
</head>

<body>

<div class="container">

<h2>🌱 Simulasi Tumbesaran Pokok</h2>
<p id="day">Hari: 1</p>

<div id="plantArea">🌱</div>
<p id="status">Pokok baru ditanam</p>

<!-- Controls -->
<button class="water" onclick="addWater()">💧 Siram</button>
<button class="soil" onclick="addSoil()">🌱 Baja</button>
<button class="light" onclick="toggleLight()">☀️ Cahaya</button>

<!-- Progress UI -->
<div class="card">
  <p>💧 Air</p>
  <div class="bar"><div id="waterBar" class="fill waterFill"></div></div>

  <p>☀️ Cahaya</p>
  <div class="bar"><div id="lightBar" class="fill lightFill"></div></div>

  <p>🌱 Tanah</p>
  <div class="bar"><div id="soilBar" class="fill soilFill"></div></div>
</div>

</div>

<script>
let water = 50;
let light = 50;
let soil = 50;
let day = 1;

function updateBars() {
  document.getElementById("waterBar").style.width = water + "%";
  document.getElementById("lightBar").style.width = light + "%";
  document.getElementById("soilBar").style.width = soil + "%";
}

function addWater() {
  water = Math.min(100, water + 20);
}

function addSoil() {
  soil = Math.min(100, soil + 20);
}

function toggleLight() {
  if (light > 0) {
    light = 0;
    document.body.classList.add("dark");
  } else {
    light = 100;
    document.body.classList.remove("dark");
  }
}

function updatePlant() {
  let plant = document.getElementById("plantArea");
  let status = document.getElementById("status");

  let avg = (water + light + soil) / 3;

  plant.classList.remove("grow", "wilt");

  if(avg > 70) {
    plant.innerHTML = "🌳";
    plant.classList.add("grow");
    status.innerHTML = "Pokok sihat 🌿";
  }
  else if(avg > 40) {
    plant.innerHTML = "🌿";
    status.innerHTML = "Pokok sederhana";
  }
  else if(avg > 20) {
    plant.innerHTML = "🥀";
    plant.classList.add("wilt");
    status.innerHTML = "Pokok layu!";
  }
  else {
    plant.innerHTML = "💀";
    status.innerHTML = "Pokok mati...";
  }
}

function nextDay() {
  day++;
  document.getElementById("day").innerHTML = "Hari: " + day;

  // decay (realistic effect)
  water -= 10;
  soil -= 5;

  water = Math.max(0, water);
  soil = Math.max(0, soil);

  updateBars();
  updatePlant();
}

// auto day simulation
setInterval(nextDay, 3000);

updateBars();
updatePlant();
</script>

</body>
</html>
